<header>
  <link rel="stylesheet" href="styles.css">
  <script defer src="scripts.js"></script>
  <h1>Manderz Creative Creations</h1>
  <nav>
    <a href="#" onclick="showPage('home')">Home</a>
    <a href="#" onclick="showPage('shop')">Shop</a>
    <a href="#" onclick="showPage('cart')">Cart</a>
  </nav>
</header>

<!-- HOME PAGE -->
<section id="home" class="page">
  <div class="hero">
    <h2>Handmade Shirts, Cards & Crafts</h2>
    <p>Unique items made with care</p>
    <button class="btn" onclick="showPage('shop')">Shop Now</button>
  </div>
</section>

<!-- SHOP PAGE -->
<section id="shop" class="page hidden">
  <h2>Shop Products</h2>
  <div class="product-grid">

    <div class="product-card">
      <img src="https://via.placeholder.com/200" alt="Shirt">
      <h3>Custom Shirt</h3>
      <p>$25.00</p>
      <button onclick="addToCart('Custom Shirt', 20)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://imgur.com/a/manderz-creative-creations-yhD1EKx" alt="Card">
      <h3>Handmade Card</h3>
      <p>$12.00</p>
      <button onclick="addToCart('Handmade Card', 5)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/200" alt="Craft">
      <h3>Decorative Craft</h3>
      <p>$12.00 - $25.00</p>
      <button onclick="addToCart('Decorative Craft', 12)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CART PAGE -->
<section id="cart" class="page hidden">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
</section>

<footer>
  <p>© 2024 Manderz Creative Creations</p>
</footer>
